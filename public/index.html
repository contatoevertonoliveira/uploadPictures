<!doctype html>
<html class="light" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Nossas Memórias</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'tertiary-fixed': '#f0e0c8',
              'surface-container-highest': '#e8e2d4',
              'secondary-fixed': '#d5e5ef',
              'secondary-fixed-dim': '#b9c9d3',
              'surface-tint': '#735a31',
              'on-primary-fixed': '#281900',
              'secondary-container': '#d2e2ec',
              'on-tertiary-fixed': '#221b0b',
              'tertiary-container': '#c5b7a0',
              'on-secondary': '#ffffff',
              tertiary: '#685d4a',
              'error-container': '#ffdad6',
              'on-surface-variant': '#4d463b',
              outline: '#7f7669',
              'surface-dim': '#e0d9cc',
              'on-error': '#ffffff',
              'surface-container-lowest': '#ffffff',
              'on-primary-fixed-variant': '#59431c',
              'inverse-primary': '#e3c290',
              'on-tertiary-container': '#524836',
              background: '#fff9ed',
              'tertiary-fixed-dim': '#d3c5ad',
              'on-surface': '#1e1c13',
              'on-secondary-fixed-variant': '#3a4951',
              'primary-fixed': '#ffdeac',
              'surface-container-high': '#eee8da',
              'on-secondary-fixed': '#0e1d25',
              'inverse-surface': '#333027',
              'on-error-container': '#93000a',
              primary: '#735a31',
              'surface-container-low': '#faf3e5',
              'on-secondary-container': '#55656d',
              'outline-variant': '#d1c5b7',
              'on-background': '#1e1c13',
              secondary: '#516169',
              'primary-container': '#d4b483',
              'surface-variant': '#e8e2d4',
              'on-tertiary': '#ffffff',
              surface: '#fff9ed',
              'primary-fixed-dim': '#e3c290',
              'on-primary-container': '#5c451e',
              'surface-container': '#f4eddf',
              'surface-bright': '#fff9ed',
              'inverse-on-surface': '#f7f0e2',
              'on-primary': '#ffffff',
              error: '#ba1a1a',
              'on-tertiary-fixed-variant': '#4f4533',
            },
            borderRadius: {
              DEFAULT: '0.25rem',
              lg: '1rem',
              xl: '1.5rem',
              full: '9999px',
            },
            fontFamily: {
              headline: ['Noto Serif'],
              body: ['Manrope'],
              label: ['Manrope'],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #fff9ed;
        min-height: max(884px, 100dvh);
        -webkit-text-size-adjust: 100%;
      }
      h1,
      h2,
      h3 {
        font-family: 'Noto Serif', serif;
      }
      .hero-gradient {
        background: linear-gradient(
          to bottom,
          rgba(255, 249, 237, 0) 0%,
          rgba(255, 249, 237, 0.8) 70%,
          rgba(255, 249, 237, 1) 100%
        );
      }
      .btn-shadow {
        box-shadow: 0 12px 40px rgba(115, 90, 49, 0.08);
      }
    </style>
  </head>
  <body class="bg-background text-on-surface min-h-screen flex flex-col items-center">
    <header class="bg-stone-50/70 backdrop-blur-xl fixed top-0 w-full z-50 shadow-[0_4px_30px_rgba(115,90,49,0.05)]">
      <div class="flex justify-between items-center px-6 py-4 w-full">
        <button class="text-amber-900 hover:opacity-80 transition-opacity active:transition-transform scale-95" type="button">
          <span class="material-symbols-outlined">menu</span>
        </button>
        <h1 class="font-serif text-2xl tracking-tight text-amber-900">Nossas Memórias</h1>
        <div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
          <img
            alt="Profile"
            class="w-full h-full object-cover"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAczaaO7_TL8M6GKzo9tRfYK86MLK6RMI-OhnmDlq2p3M8yCCg8pS530QAR8Gj71mELln39q6vppO6K1XoaevY96XoWwUVLeDL9ztPKEjwRb3osmpuWsOXv_OXMKsruWrrg2TrRIvrPOPV4MwRKae07MJx78f6gjsfWClzUybaltYbCMUwp45cGZxtB0HC_srX6tyPUCu4TKxaft7cBEhHLp6VYNccmZrN03azODcTHQCIQwS2psMmvlL72KH7VL_2Fl3jeqP8MLjs"
          />
        </div>
      </div>
    </header>

    <main class="w-full max-w-md flex-1 flex flex-col pt-20 pb-32 px-6">
      <section class="relative w-full aspect-[4/5] rounded-xl overflow-hidden mt-4 group">
        <img
          alt="Roma"
          class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
          src="/assets/roma.png"
          onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%221200%22 height=%221500%22%3E%3Crect width=%221200%22 height=%221500%22 fill=%22%23fff9ed%22/%3E%3Ctext x=%2260%22 y=%22200%22 font-size=%2270%22 fill=%22%23735a31%22 font-family=%22Noto Serif%22%3ERoma%3C/text%3E%3Ctext x=%2260%22 y=%22280%22 font-size=%2236%22 fill=%22%234d463b%22 font-family=%22Manrope%22%3EColoque roma.png em /assets%3C/text%3E%3C/svg%3E';"
        />
        <div class="absolute inset-0 hero-gradient"></div>
        <div class="absolute bottom-0 left-0 p-8 w-full text-center">
          <h2 class="text-3xl font-serif text-on-surface leading-tight mb-2">Vamos registrar tudo meus amigos!</h2>
          <div class="w-12 h-0.5 bg-primary-container mx-auto"></div>
        </div>
      </section>

      <section class="flex flex-col gap-6 mt-12 w-full items-center">
        <button
          id="btnCamera"
          class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-5 px-8 rounded-full flex items-center justify-center gap-4 btn-shadow hover:opacity-95 active:scale-95 transition-all duration-300 group"
          type="button"
        >
          <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">photo_camera</span>
          <span class="font-bold tracking-wide uppercase text-sm">Câmera</span>
        </button>

        <button
          id="btnUpload"
          class="w-full bg-surface-container-lowest text-primary py-5 px-8 rounded-full flex items-center justify-center gap-4 btn-shadow border border-outline-variant/20 hover:bg-surface-container-low active:scale-95 transition-all duration-300"
          type="button"
        >
          <span class="material-symbols-outlined text-2xl">folder_open</span>
          <span class="font-bold tracking-wide uppercase text-sm">Upload da Galeria</span>
        </button>
      </section>

      <input id="inputCamera" class="hidden" type="file" accept="image/*" capture="environment" />
      <input id="inputUpload" class="hidden" type="file" accept="image/*" multiple />

      <footer class="mt-12 text-center">
        <p class="text-on-surface-variant text-xs italic font-serif opacity-70">
          Todas as fotos serão salvas automaticamente em nosso álbum compartilhado.
        </p>
        <div id="status" class="hidden mt-5 text-xs font-serif text-on-surface-variant opacity-80"></div>
        <div id="historyTitle" class="hidden mt-6 mb-2 text-xs font-bold uppercase tracking-wide text-primary">
          Galeria
        </div>
        <div id="list" class="hidden mt-4 grid gap-2"></div>
      </footer>
    </main>

    <nav class="fixed bottom-0 left-0 w-full z-50 bg-stone-50/80 backdrop-blur-lg rounded-t-[2rem] shadow-[0_-8px_40px_rgba(115,90,49,0.08)]">
      <div class="fixed bottom-0 left-0 w-full flex justify-center items-center px-4 pb-6 pt-3">
        <a
          id="navGallery"
          class="flex flex-col items-center justify-center bg-gradient-to-br from-amber-800 to-amber-600 text-white rounded-full px-8 py-2 active:scale-90 transition-all duration-300"
          href="#galeria"
        >
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">auto_awesome_mosaic</span>
          <span class="font-sans text-[11px] font-medium tracking-wide uppercase">Galeria</span>
        </a>
      </div>
    </nav>

    <script>
      const ui = {
        btnCamera: document.getElementById('btnCamera'),
        btnUpload: document.getElementById('btnUpload'),
        inputCamera: document.getElementById('inputCamera'),
        inputUpload: document.getElementById('inputUpload'),
        status: document.getElementById('status'),
        list: document.getElementById('list'),
        historyTitle: document.getElementById('historyTitle'),
        navGallery: document.getElementById('navGallery'),
      };

      function setStatus(message, kind) {
        ui.status.classList.remove('hidden');
        ui.status.innerHTML = message;
        if (kind === 'ok') ui.status.className = 'mt-5 text-xs font-serif text-primary opacity-90';
        else if (kind === 'err') ui.status.className = 'mt-5 text-xs font-serif text-red-700 opacity-90';
        else ui.status.className = 'mt-5 text-xs font-serif text-on-surface-variant opacity-80';
      }

      function addItem(fileName, url, options = {}) {
        const shouldPrepend = options.prepend !== false;
        ui.list.classList.remove('hidden');
        ui.historyTitle.classList.remove('hidden');

        const row = document.createElement('div');
        row.className =
          'flex items-center justify-between gap-3 px-4 py-3 rounded-full bg-surface-container-lowest border border-outline-variant/30 btn-shadow';

        const name = document.createElement('div');
        name.className = 'min-w-0 truncate text-xs text-on-surface-variant';
        name.textContent = fileName;

        const link = document.createElement('a');
        link.href = url;
        link.rel = 'noopener noreferrer';
        link.target = '_blank';
        link.className = 'text-primary font-bold text-xs uppercase tracking-wide whitespace-nowrap';
        link.textContent = 'Abrir';

        row.appendChild(name);
        row.appendChild(link);
        if (shouldPrepend) ui.list.prepend(row);
        else ui.list.appendChild(row);
      }

      function clearItems() {
        ui.list.innerHTML = '';
      }

      async function uploadOne(file, source) {
        const form = new FormData();
        form.append('file', file, file.name || 'foto');
        form.append('source', source);

        const res = await fetch('/api/upload', {
          method: 'POST',
          body: form,
        });

        const json = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(json.error || 'Erro ao enviar.');
        }

        return json;
      }

      async function uploadFiles(files, source) {
        if (!files || files.length === 0) return;

        ui.btnCamera.disabled = true;
        ui.btnUpload.disabled = true;
        ui.btnCamera.classList.add('opacity-60');
        ui.btnUpload.classList.add('opacity-60');

        try {
          for (let i = 0; i < files.length; i++) {
            const file = files[i];
            setStatus(`<strong>Enviando...</strong> ${i + 1}/${files.length} — ${escapeHtml(file.name || 'foto')}`, null);
            const res = await uploadOne(file, source);
            addItem(res.name || file.name || 'foto', res.url, { prepend: true });
          }
          setStatus(`<strong>OK!</strong> Envio concluído.`, 'ok');
        } catch (e) {
          const msg = e && e.message ? e.message : String(e || 'Erro ao enviar.');
          setStatus(`<strong>Erro:</strong> ${escapeHtml(msg)}`, 'err');
        } finally {
          ui.btnCamera.disabled = false;
          ui.btnUpload.disabled = false;
          ui.btnCamera.classList.remove('opacity-60');
          ui.btnUpload.classList.remove('opacity-60');
          ui.inputCamera.value = '';
          ui.inputUpload.value = '';
        }
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      ui.btnCamera.addEventListener('click', () => ui.inputCamera.click());
      ui.btnUpload.addEventListener('click', () => ui.inputUpload.click());
      ui.inputCamera.addEventListener('change', (e) => uploadFiles(e.target.files, 'camera'));
      ui.inputUpload.addEventListener('change', (e) => uploadFiles(e.target.files, 'upload'));
      ui.navGallery.addEventListener('click', (e) => {
        e.preventDefault();
        const target = !ui.historyTitle.classList.contains('hidden') ? ui.historyTitle : ui.status;
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });

      clearItems();
    </script>
  </body>
</html>

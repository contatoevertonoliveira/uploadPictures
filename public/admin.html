<!doctype html>
<html class="light" lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Admin - Casorio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: '#fff9ed',
              primary: '#735a31',
              'primary-container': '#d4b483',
              'on-surface': '#1e1c13',
              'on-surface-variant': '#4d463b',
              'surface-container-lowest': '#ffffff',
              'surface-container-low': '#faf3e5',
              'outline-variant': '#d1c5b7',
            },
            borderRadius: {
              xl: '1.5rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #fff9ed;
        -webkit-text-size-adjust: 100%;
      }
      h1,
      h2,
      h3 {
        font-family: 'Noto Serif', serif;
      }
      .btn-shadow {
        box-shadow: 0 12px 40px rgba(115, 90, 49, 0.08);
      }
    </style>
  </head>
  <body class="bg-background text-on-surface min-h-screen">
    <header class="sticky top-0 bg-stone-50/70 backdrop-blur-xl z-50 border-b border-outline-variant/40">
      <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between gap-3">
        <div>
          <h1 class="text-xl font-serif text-primary">Admin</h1>
          <div id="meta" class="text-xs text-on-surface-variant"></div>
        </div>
        <div class="flex items-center gap-2">
          <button id="btnReload" class="px-4 py-2 rounded-full bg-surface-container-lowest border border-outline-variant/40 btn-shadow">
            Recarregar
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-6">
      <section class="bg-surface-container-lowest border border-outline-variant/40 rounded-xl p-4 btn-shadow">
        <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
          <div class="flex-1">
            <div class="text-sm font-semibold text-primary">Enviar selecionadas</div>
            <div class="text-xs text-on-surface-variant">
              Se o campo de e-mails estiver vazio, usa os e-mails do config/recipients.json.
            </div>
          </div>
          <div class="flex flex-col md:flex-row gap-2 w-full md:w-auto">
            <input
              id="emails"
              class="w-full md:w-[420px] rounded-full border border-outline-variant/50 bg-white px-4 py-2 text-sm"
              placeholder="emails (opcional): a@a.com, b@b.com"
              type="text"
            />
            <button
              id="btnSend"
              class="px-5 py-2 rounded-full bg-gradient-to-br from-primary to-primary-container text-white font-semibold btn-shadow"
            >
              Enviar
            </button>
          </div>
        </div>

        <div class="mt-3 flex flex-wrap items-center gap-2">
          <button id="btnSelectAll" class="px-4 py-2 rounded-full bg-surface-container-low border border-outline-variant/40">
            Selecionar tudo
          </button>
          <button id="btnClear" class="px-4 py-2 rounded-full bg-surface-container-low border border-outline-variant/40">
            Limpar seleção
          </button>
          <div id="status" class="text-sm text-on-surface-variant"></div>
        </div>
      </section>

      <section class="mt-6">
        <div class="flex items-center justify-between">
          <h2 class="text-base font-semibold text-primary">Fotos na VPS</h2>
          <div id="count" class="text-sm text-on-surface-variant"></div>
        </div>
        <div id="grid" class="mt-3 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
      </section>
    </main>

    <div id="modal" class="hidden fixed inset-0 z-[100]">
      <div id="modalBackdrop" class="absolute inset-0 bg-black/70"></div>
      <div class="relative w-full h-full flex items-center justify-center p-4">
        <div class="relative w-full max-w-5xl">
          <button
            id="modalClose"
            class="absolute -top-3 -right-3 h-10 w-10 rounded-full bg-white text-primary border border-outline-variant/60 btn-shadow flex items-center justify-center text-xl leading-none"
            type="button"
            aria-label="Fechar"
          >
            ×
          </button>
          <div class="rounded-xl overflow-hidden bg-white border border-outline-variant/50 btn-shadow">
            <img id="modalImg" alt="" class="w-full max-h-[78vh] object-contain bg-black" />
            <div id="modalCaption" class="px-4 py-3 text-xs text-on-surface-variant truncate"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="confirmModal" class="hidden fixed inset-0 z-[110]">
      <div id="confirmBackdrop" class="absolute inset-0 bg-black/60"></div>
      <div class="relative w-full h-full flex items-center justify-center p-4">
        <div class="w-full max-w-md rounded-xl overflow-hidden bg-white border border-outline-variant/50 btn-shadow">
          <div class="px-4 py-4">
            <div class="text-base font-semibold text-on-surface">Excluir foto?</div>
            <div id="confirmText" class="mt-2 text-sm text-on-surface-variant break-words"></div>
          </div>
          <div class="px-4 py-4 flex items-center justify-end gap-2 bg-surface-container-low">
            <button id="confirmCancel" class="px-4 py-2 rounded-full bg-white border border-outline-variant/50">
              Cancelar
            </button>
            <button id="confirmDelete" class="px-4 py-2 rounded-full bg-red-600 text-white font-semibold">
              Excluir
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const ui = {
        meta: document.getElementById('meta'),
        btnReload: document.getElementById('btnReload'),
        btnSend: document.getElementById('btnSend'),
        btnSelectAll: document.getElementById('btnSelectAll'),
        btnClear: document.getElementById('btnClear'),
        emails: document.getElementById('emails'),
        status: document.getElementById('status'),
        count: document.getElementById('count'),
        grid: document.getElementById('grid'),
        modal: document.getElementById('modal'),
        modalBackdrop: document.getElementById('modalBackdrop'),
        modalClose: document.getElementById('modalClose'),
        modalImg: document.getElementById('modalImg'),
        modalCaption: document.getElementById('modalCaption'),
        confirmModal: document.getElementById('confirmModal'),
        confirmBackdrop: document.getElementById('confirmBackdrop'),
        confirmCancel: document.getElementById('confirmCancel'),
        confirmDelete: document.getElementById('confirmDelete'),
        confirmText: document.getElementById('confirmText'),
      };

      const state = {
        items: [],
        selected: new Set(),
      };

      let ignoreNextToggleUntil = 0;
      let pendingDelete = null;

      function setStatus(text, kind) {
        ui.status.textContent = text || '';
        ui.status.className =
          kind === 'err'
            ? 'text-sm text-red-700'
            : kind === 'ok'
              ? 'text-sm text-green-700'
              : 'text-sm text-on-surface-variant';
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function openModal(url, title) {
        ui.modalImg.src = url;
        ui.modalImg.alt = title || 'Foto';
        ui.modalCaption.textContent = title || '';
        ui.modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        ui.modal.classList.add('hidden');
        ui.modalImg.src = '';
        ui.modalImg.alt = '';
        ui.modalCaption.textContent = '';
        document.body.style.overflow = '';
      }

      function openConfirmDelete(item) {
        pendingDelete = item;
        ui.confirmText.textContent = item && item.name ? item.name : '';
        ui.confirmModal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      }

      function closeConfirmDelete() {
        ui.confirmModal.classList.add('hidden');
        pendingDelete = null;
        document.body.style.overflow = '';
      }

      function markIgnoreToggle() {
        ignoreNextToggleUntil = Date.now() + 450;
      }

      function toggleSelection(relPath, checkbox, wrapper) {
        if (Date.now() < ignoreNextToggleUntil) return;
        if (state.selected.has(relPath)) state.selected.delete(relPath);
        else state.selected.add(relPath);
        checkbox.checked = state.selected.has(relPath);
        renderSelectionOnly(relPath, wrapper);
        ui.count.textContent = `${state.items.length} arquivos • ${state.selected.size} selecionados`;
      }

      function render() {
        ui.grid.innerHTML = '';
        ui.count.textContent = `${state.items.length} arquivos • ${state.selected.size} selecionados`;

        state.items.forEach((item) => {
          const wrapper = document.createElement('div');
          wrapper.className =
            'relative block rounded-xl overflow-hidden border border-outline-variant/50 bg-white btn-shadow cursor-pointer select-none';

          const img = document.createElement('img');
          img.src = item.url;
          img.alt = item.name;
          img.loading = 'lazy';
          img.className = 'w-full aspect-square object-cover';

          const overlay = document.createElement('div');
          overlay.className = 'absolute inset-0 bg-black/30 opacity-0 transition-opacity';

          const badge = document.createElement('div');
          badge.className =
            'absolute top-2 left-2 text-[10px] px-2 py-1 rounded-full bg-white/90 border border-outline-variant/50';
          badge.textContent = item.bucket === 'pending' ? 'Pendente' : 'Enviado';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'absolute top-2 right-2 h-5 w-5 rounded border-outline-variant';
          checkbox.checked = state.selected.has(item.relPath);
          checkbox.addEventListener('click', (e) => e.stopPropagation());
          checkbox.addEventListener('change', () => toggleSelection(item.relPath, checkbox, wrapper));

          const trash = document.createElement('button');
          trash.type = 'button';
          trash.className =
            'absolute bottom-2 right-2 h-9 w-9 rounded-full bg-white/85 border border-outline-variant/50 flex items-center justify-center text-primary btn-shadow opacity-60 hover:opacity-100 transition-opacity';
          trash.setAttribute('aria-label', 'Excluir');
          trash.innerHTML =
            '<span class="material-symbols-outlined" style="font-variation-settings: \'FILL\' 0; font-size: 20px;">delete</span>';
          trash.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            markIgnoreToggle();
            openConfirmDelete(item);
          });

          const caption = document.createElement('div');
          caption.className = 'p-2 text-[11px] text-on-surface-variant truncate';
          caption.title = item.name;
          caption.textContent = item.name;

          wrapper.addEventListener('click', () => toggleSelection(item.relPath, checkbox, wrapper));

          wrapper.addEventListener('dblclick', (e) => {
            e.preventDefault();
            e.stopPropagation();
            markIgnoreToggle();
            openModal(item.url, item.name);
          });

          let lastTapAt = 0;
          wrapper.addEventListener(
            'touchend',
            (e) => {
              const now = Date.now();
              if (now - lastTapAt <= 320) {
                e.preventDefault();
                markIgnoreToggle();
                openModal(item.url, item.name);
                lastTapAt = 0;
                return;
              }
              lastTapAt = now;
            },
            { passive: false }
          );

          wrapper.appendChild(img);
          wrapper.appendChild(overlay);
          wrapper.appendChild(badge);
          wrapper.appendChild(checkbox);
          wrapper.appendChild(trash);
          wrapper.appendChild(caption);

          renderSelectionOnly(item.relPath, wrapper);
          ui.grid.appendChild(wrapper);
        });
      }

      function renderSelectionOnly(relPath, wrapper) {
        const selected = state.selected.has(relPath);
        wrapper.style.outline = selected ? '3px solid #735a31' : 'none';
        const overlay = wrapper.children[1];
        overlay.style.opacity = selected ? '1' : '0';
      }

      async function loadAll() {
        setStatus('Carregando...', null);
        const res = await fetch('/api/admin/list');
        const json = await res.json().catch(() => ({}));
        if (!res.ok) {
          setStatus(json.error || 'Falha ao carregar.', 'err');
          return;
        }

        state.items = Array.isArray(json.items) ? json.items : [];
        state.selected = new Set();
        setStatus('Pronto.', 'ok');
        ui.meta.innerHTML = `Atualizado em ${escapeHtml(new Date().toLocaleString('pt-BR'))}`;
        render();
      }

      async function sendSelected() {
        const files = Array.from(state.selected);
        if (files.length === 0) {
          setStatus('Selecione pelo menos uma foto.', 'err');
          return;
        }

        ui.btnSend.disabled = true;
        ui.btnSend.classList.add('opacity-60');
        setStatus(`Enviando ${files.length} arquivo(s)...`, null);

        try {
          const res = await fetch('/api/admin/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              files,
              emails: ui.emails.value,
            }),
          });
          const json = await res.json().catch(() => ({}));
          if (!res.ok || !json.ok) {
            throw new Error(json.error || 'Falha ao enviar.');
          }
          setStatus(`OK! Enviado ${json.count} foto(s). ZIP: ${json.zipName}`, 'ok');
          await loadAll();
        } catch (e) {
          const msg = e && e.message ? e.message : String(e || 'Erro.');
          setStatus(msg, 'err');
        } finally {
          ui.btnSend.disabled = false;
          ui.btnSend.classList.remove('opacity-60');
        }
      }

      ui.btnReload.addEventListener('click', () => loadAll());
      ui.btnSelectAll.addEventListener('click', () => {
        state.items.forEach((i) => state.selected.add(i.relPath));
        render();
      });
      ui.btnClear.addEventListener('click', () => {
        state.selected = new Set();
        render();
      });
      ui.btnSend.addEventListener('click', () => sendSelected());

      ui.modalClose.addEventListener('click', () => closeModal());
      ui.modalBackdrop.addEventListener('click', () => closeModal());
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !ui.modal.classList.contains('hidden')) {
          closeModal();
        }
      });

      ui.confirmCancel.addEventListener('click', () => closeConfirmDelete());
      ui.confirmBackdrop.addEventListener('click', () => closeConfirmDelete());
      ui.confirmDelete.addEventListener('click', async () => {
        if (!pendingDelete) return;
        const target = pendingDelete;
        ui.confirmDelete.disabled = true;
        ui.confirmDelete.classList.add('opacity-60');
        setStatus('Excluindo...', null);

        try {
          const res = await fetch('/api/admin/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file: target.relPath }),
          });
          const json = await res.json().catch(() => ({}));
          if (!res.ok || !json.ok) {
            throw new Error(json.error || 'Falha ao excluir.');
          }

          state.selected.delete(target.relPath);
          state.items = state.items.filter((i) => i.relPath !== target.relPath);
          setStatus('Foto excluída.', 'ok');
          closeConfirmDelete();
          render();
        } catch (e) {
          const msg = e && e.message ? e.message : String(e || 'Erro.');
          setStatus(msg, 'err');
        } finally {
          ui.confirmDelete.disabled = false;
          ui.confirmDelete.classList.remove('opacity-60');
        }
      });

      loadAll();
    </script>
  </body>
</html>
